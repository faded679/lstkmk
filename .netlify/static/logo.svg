<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Building icon -->
  <g>
    <!-- Vertical bars representing building -->
    <rect x="4" y="14" width="3.5" height="22" rx="0.5" fill="#F97316"/>
    <rect x="10" y="8" width="3.5" height="28" rx="0.5" fill="#1E40AF"/>
    <rect x="16" y="4" width="3.5" height="32" rx="0.5" fill="#1E40AF"/>
    <rect x="22" y="10" width="3.5" height="26" rx="0.5" fill="#1E40AF"/>
    <rect x="28" y="16" width="3.5" height="20" rx="0.5" fill="#3B82F6"/>
    <!-- Roof/triangle accent -->
    <polygon points="14,2 20,2 17,0" fill="#F97316"/>
  </g>
  <!-- Text МАКСТИЛ -->
  <text x="38" y="28" font-family="system-ui, sans-serif" font-weight="700" font-size="20" letter-spacing="-0.5">
    <tspan fill="#1E40AF">МАКС</tspan><tspan fill="#1E40AF">ТИЛ</tspan>
  </text>
</svg>
