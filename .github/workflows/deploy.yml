name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 89.111.163.48
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/lstkmk.ru
          git pull origin main
          npm ci
          npm run build
          # Копируем статику для standalone режима (удаляем старую чтобы не было стейл чанков)
          rm -rf .next/standalone/.next/static
          cp -r .next/static .next/standalone/.next/static
          rm -rf .next/standalone/public
          cp -r public .next/standalone/public
          # Проверяем и создаем папку для логов
          mkdir -p /var/log/pm2
          # Запускаем/перезапускаем через PM2 с конфигом
          if pm2 list | grep -q "lstkmk"; then
            pm2 reload ecosystem.config.js --env production
          else
            pm2 start ecosystem.config.js --env production
          fi
          pm2 save
